<!doctype html>
<html>
	<head>
		<meta charset="utf-8"/>
		<title>diff</title>
		<style>
			body {
				--diff-accent-bg: var(--color-background-info, #1f2a3a);
				--diff-accent-fg: var(--color-text-warning, #9cc3ff);
				--diff-code-comment: var(--color-text-secondary, #9aa092);
				--diff-code-punctuation: var(--color-text-primary, #e5e5dd);
				--diff-code-constant: #f2a45d;
				--diff-code-tag: #6fd6c2;
				--diff-code-number: #f0c169;
				--diff-code-string: #87d97a;
				--diff-code-operator: var(--color-text-primary, #d4d8df);
				--diff-code-keyword: #b6a6ff;
				--diff-code-entity: #72c2ff;
				--diff-code-variable: #f2a2e8;
				--diff-code-attr-name: #7dd3e8;
				--diff-code-attr-value: #ffd28a;
			}

			body {
				font-family: var(--font-sans, Arial, sans-serif);
				margin: 0;
				padding: 0.875rem 1rem;
				background: var(--color-background-primary, #fdfdfb);
				color: var(--color-text-primary, #1f1f1b);
			}

			body[data-view='unified'] .diff-head-split, body[data-view='unified'] .diff-body-split {
				display: none;
			}

			body[data-view='split'] .diff-head-unified, body[data-view='split'] .diff-body-unified {
				display: none;
			}

			.mcp-toolbar {
				display: inline-flex;
				align-items: center;
				border: 1px solid color-mix(in srgb, var(--color-border-primary, #d8d7d1) 50%, var(--color-background-primary, #fdfdfb) 50%);
				border-radius: var(--border-radius-md, 0.5rem);
				overflow: hidden;
				margin-left: auto;
				background: var(--color-background-secondary, #f0f0ec);
			}

			.mcp-button {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				padding: 0.25rem 0.625rem;
				border: 0;
				background: transparent;
				color: var(--color-text-secondary, #4b4a44);
				font-size: 0.75rem;
				line-height: 1.4;
				cursor: pointer;
			}

			.mcp-button + .mcp-button {
				border-left: 1px solid color-mix(in srgb, var(--color-border-primary, #d8d7d1) 50%, var(--color-background-primary, #fdfdfb) 50%);
			}

			.mcp-button.active {
				background: var(--diff-accent-bg);
				color: var(--diff-accent-fg);
			}

			table.diff {
				width: 100%;
				border-collapse: separate;
				border-spacing: 0;
				table-layout: auto;
			}

			table.diff th, table.diff td {
				vertical-align: top;
			}

			table.diff thead th {
				font-weight: 600;
				color: var(--color-text-primary, #1f1f1b);
				padding: 0.5rem;
			}

			.diff-head-toolbar {
				text-align: right;
				width: 1%;
				white-space: nowrap;
				position: absolute;
				left: calc(100% - 135px);
			}

			.diff-head-unified th.ln, .diff-layout-unified td.ln {
				width: 56px;
			}

			.diff-head-split th.ln, .diff-layout-split td.ln {
				width: 56px;
			}

			td.ln {
				width: 56px;
				text-align: right;
				color: var(--color-text-secondary, #4b4a44);
				padding: 0.125rem 0.5rem;
				background: var(--color-background-primary, #fdfdfb);
				border-right: 1px solid color-mix(in srgb, var(--color-border-primary, #d8d7d1) 40%, var(--color-background-primary, #fdfdfb) 60%);
				user-select: none;
				-webkit-user-select: none;
				font-size: 0.75rem;
			}

			td.code {
				width: auto;
				padding: 0.125rem 0.5rem;
				background: var(--color-background-primary, #fdfdfb);
			}

			.code-block {
				background: transparent;
			}

			.code-block code {
				display: block;
				background: transparent;
				color: inherit;
			}

			table.diff.diff-layout-split td.code {
				width: calc(50% - 56px);
				max-width: calc(50vw - 80px);
				padding: 0.125rem 0.5rem;
			}

			table.diff.diff-layout-split td.ln {
				padding: 0;
				font-size: 0.8125rem;
			}

			table.diff.diff-layout-unified td.ln {
				padding: 0.125rem 0.5rem;
			}

			table.diff.diff-layout-unified td.code {
				padding: 0.125rem 0.5rem;
			}

			.status-shell {
				display: none;
				padding: 1rem;
				margin: 0.5rem 0 0;
				border: 1px solid color-mix(in srgb, var(--color-border-primary, #d8d7d1) 55%, var(--color-background-primary, #fdfdfb) 45%);
				border-radius: var(--border-radius-md, 0.5rem);
				font-size: 0.875rem;
				line-height: 1.5;
			}

			.status-shell strong {
				display: block;
				margin-bottom: 0.25rem;
				font-size: 0.875rem;
			}

			.status-shell p {
				margin: 0;
			}

			.loading-shell {
				color: var(--color-text-secondary, #4b4a44);
				background: color-mix(in srgb, var(--color-background-secondary, #f0f0ec) 65%, var(--color-background-primary, #fdfdfb) 35%);
			}

			.error-shell {
				color: var(--color-text-danger, #b3343a);
				background: color-mix(in srgb, var(--color-background-danger, #b3343a) 18%, var(--color-background-primary, #fdfdfb) 82%);
				border-color: color-mix(in srgb, var(--color-background-danger, #b3343a) 45%, var(--color-border-primary, #d8d7d1) 55%);
			}

			.warning-shell {
				color: var(--color-text-warning, #7a5c1f);
				background: color-mix(in srgb, var(--color-background-warning, #7a5c1f) 18%, var(--color-background-primary, #fdfdfb) 82%);
				border-color: color-mix(in srgb, var(--color-background-warning, #7a5c1f) 45%, var(--color-border-primary, #d8d7d1) 55%);
			}

			body[data-state='loading'] .loading-shell,
					body[data-state='error'] .error-shell,
					body[data-state='warning'] .warning-shell {
				display: block;
			}

			body[data-state='loading'] #diff-table,
					body[data-state='error'] #diff-table,
					body[data-state='warning'] #diff-table {
				display: none;
			}

			table.diff.diff-layout-split pre {
				line-height: 1.25;
			}

			tr.del td.ln, tr.del td.code {
				background: color-mix(in srgb, var(--color-background-danger, #b3343a) 75%, var(--color-background-primary, #fdfdfb));
			}

			tr.ins td.ln, tr.ins td.code {
				background: color-mix(in srgb, var(--color-background-success, #2f7f6b) 75%, var(--color-background-primary, #fdfdfb));
			}

			tr.eq td.ln, tr.eq td.code {
				background: var(--color-background-primary, #fdfdfb);
			}

			tr.ctx-row {
				display: none;
			}

			tr.ctx-row.ctx-open {
				display: table-row;
			}

			tr.ctx-row:not(.ctx-open) {
				display: none;
			}

			tr.ctx-toggle td {
				padding: 0.125rem 0;
				background: var(--color-background-primary, #fdfdfb);
				border-top: 1px solid color-mix(in srgb, var(--color-border-primary, #d8d7d1) 40%, var(--color-background-primary, #fdfdfb) 60%);
				border-bottom: 1px solid color-mix(in srgb, var(--color-border-primary, #d8d7d1) 40%, var(--color-background-primary, #fdfdfb) 60%);
			}

			tr.diff-warning td {
				padding: 0.375rem 0.5rem;
				background: color-mix(in srgb, var(--color-background-warning, #7a5c1f) 35%, var(--color-background-primary, #fdfdfb));
				color: var(--color-text-primary, #1f1f1b);
				font-size: 0.75rem;
			}

			.ctx-cell {
				text-align: center;
			}

			.ctx-btn {
				font: inherit;
				font-size: 0.75rem;
				color: var(--diff-accent-fg);
				background: transparent;
				border: 0;
				padding: 0 0.5rem;
				cursor: pointer;
				border: 1px solid var(--color-border-primary, #d8d7d1);
				vertical-align: center;
			}

			pre {
				margin: 0;
				white-space: pre-wrap;
				font-family: var(--font-mono, ui-monospace, monospace);
				font-size: 0.8125rem;
				line-height: 1.45;
			}

			table.diff.diff-layout-unified td.ln pre {
				font-family: var(--font-mono, ui-monospace, monospace);
				font-size: 0.75rem;
				line-height: 1.45;
			}

			table.diff.diff-layout-unified td.code {
				width: auto;
			}

			.token.comment, .token.prolog, .token.doctype, .token.cdata {
				color: var(--diff-code-comment);
			}

			.token.punctuation {
				color: var(--diff-code-punctuation);
			}

			.token.property, .token.constant, .token.symbol, .token.deleted {
				color: var(--diff-code-constant);
			}

			.token.tag {
				color: var(--diff-code-tag);
			}

			.token.boolean, .token.number {
				color: var(--diff-code-number);
			}

			.token.selector, .token.string, .token.char, .token.builtin, .token.inserted {
				color: var(--diff-code-string);
			}

			.token.attr-name {
				color: var(--diff-code-attr-name);
			}

			.token.operator, .token.entity, .token.url, .language-css .token.string, .style .token.string {
				color: var(--diff-code-operator);
			}

			.token.atrule, .token.keyword {
				color: var(--diff-code-keyword);
				font-weight: 600;
			}

			.token.attr-value {
				color: var(--diff-code-attr-value);
				font-weight: 400;
			}

			.token.function {
				color: var(--diff-code-entity);
				font-weight: 400;
			}

			.token.class-name {
				color: var(--diff-code-entity);
				font-weight: 600;
			}

			.token.regex, .token.important, .token.variable {
				color: var(--diff-code-variable);
			}

			.token.variable {
				font-weight: 400;
			}
		</style>
	</head>
	<body data-view="unified" data-state="idle">
		<div class="status-shell loading-shell" id="loading-shell">
			<strong>Loading review</strong>
			<p>Waiting for the tool result.</p>
		</div>
		<div class="status-shell error-shell" id="error-shell">
			<strong>Could not render review</strong>
			<p id="error-message">The tool returned an error.</p>
		</div>
		<div class="status-shell warning-shell" id="warning-shell">
			<strong>No diff available</strong>
			<p id="warning-message">There are no changes to display.</p>
		</div>
		<table class="diff diff-layout-unified" id="diff-table">
			<thead class="diff-head-unified">
				<tr>
					<th class="ln">Original</th>
					<th class="ln">Updated</th>
					<th>Unified</th>
					<th class="diff-head-toolbar">
						<div class="mcp-toolbar">
							<button class="toggle mcp-button" data-view="unified">Unified</button>
							<button class="toggle mcp-button" data-view="split">Split</button>
						</div>
					</th>
				</tr>
			</thead>
			<thead class="diff-head-split">
				<tr>
					<th colspan="2">Original</th>
					<th colspan="2">Updated</th>
					<th class="diff-head-toolbar">
						<div class="mcp-toolbar">
							<button class="toggle mcp-button" data-view="unified">Unified</button>
							<button class="toggle mcp-button" data-view="split">Split</button>
						</div>
					</th>
				</tr>
			</thead>
			<tbody class="diff-body-unified" id="unified-body"></tbody>
			<tbody class="diff-body-split" id="split-body"></tbody>
		</table>
		<script>
			(function () {
				var CONTEXT_RADIUS = 3;
				function escapeHtml(value) {
					return String(value)
						.replace(/&/g, "&amp;")
						.replace(/</g, "&lt;")
						.replace(/>/g, "&gt;")
						.replace(/\"/g, "&quot;")
						.replace(/'/g, "&#39;");
				}
				function pathBasename(path) {
					var parts = String(path || "").split(/[\\/]/);
					return parts[parts.length - 1] || "";
				}
				function prismLanguage(path) {
					var name = pathBasename(path).toLowerCase();
					var ext = name.includes(".") ? name.split(".").pop() : "";
					var map = {
						js: "javascript",
						mjs: "javascript",
						cjs: "javascript",
						ts: "typescript",
						tsx: "tsx",
						jsx: "jsx",
						rs: "rust",
						py: "python",
						java: "java",
						kt: "kotlin",
						go: "go",
						rb: "ruby",
						php: "php",
						cs: "csharp",
						cpp: "cpp",
						cc: "cpp",
						cxx: "cpp",
						c: "c",
						h: "c",
						htm: "html",
						html: "html",
						xml: "xml",
						svg: "svg",
						md: "markdown",
						json: "json",
						yml: "yaml",
						yaml: "yaml",
						css: "css",
						scss: "scss",
						sh: "bash",
						bash: "bash",
						zsh: "bash",
						sql: "sql",
						toml: "toml",
						vue: "vue"
					};
					return map[ext] || "plain";
				}
				function classifyLanguage(language) {
					if (language === "javascript"
							|| language === "typescript"
							|| language === "jsx"
							|| language === "tsx"
							|| language === "rhai") {
						return "script";
					}
					if (language === "java") {
						return "java";
					}
					if (language === "json") {
						return "json";
					}
					if (language === "sql") {
						return "sql";
					}
					if (language === "bash") {
						return "bash";
					}
					if (language === "css" || language === "scss") {
						return "css";
					}
					if (language === "markdown") {
						return "markdown";
					}
					if (language === "rust") {
						return "rust";
					}
					if (language === "markup" || language === "xml" || language === "html" || language === "vue") {
						return "markup";
					}
					return "plain";
				}
				function tokenHtml(type, text) {
					var escaped = escapeHtml(text);
					if (!type || !text) {
						return escaped;
					}
					return "<span class='token " + type + "'>" + escaped + "</span>";
				}
				function classifyIdentifier(kind, text) {
					if (!text || !/^[A-Za-z_$][A-Za-z0-9_$]*$/.test(text)) {
						return kind;
					}
					if (kind === "plain") {
						return "variable";
					}
					return kind;
				}
				function pushToken(parts, type, text) {
					if (!text) {
						return;
					}
					parts.push(tokenHtml(type, text));
				}
				var wordPattern = /[A-Za-z_$][A-Za-z0-9_$-]*/y;
				var numberPattern = /(?:0[xX][0-9A-Fa-f_]+|0[bB][01_]+|0[oO][0-7_]+|\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/y;
				var operatorPattern = /(?:===|!==|==|!=|<=|>=|->|=>|&&|\|\||::|\+\+|--|\+=|-=|\*=|\/=|%=|&=|\|=|\^=|<<|>>|>>>|\.\.\.|\.\.|[+\-*/%<>=!&|^~?:])/y;
				function isWhitespaceChar(char) {
					return char === " " || char === "\t" || char === "\n" || char === "\r" || char === "\f" || char === "\v";
				}
				function isUppercaseLetter(char) {
					return char >= "A" && char <= "Z";
				}
				function isPunctuationChar(char) {
					return char === "("
						|| char === ")"
						|| char === "{"
						|| char === "}"
						|| char === "["
						|| char === "]"
						|| char === ";"
						|| char === ","
						|| char === ".";
				}
				function matchWordAt(text, index) {
					wordPattern.lastIndex = index;
					var match = wordPattern.exec(text);
					return match ? match[0] : "";
				}
				function matchNumberAt(text, index) {
					numberPattern.lastIndex = index;
					var match = numberPattern.exec(text);
					return match ? match[0] : "";
				}
				function nextNonSpaceChar(text, index) {
					for (var i = index; i < text.length; i += 1) {
						var char = text.charAt(i);
						if (!isWhitespaceChar(char)) {
							return char;
						}
					}
					return "";
				}
				function createSet(words) {
					var map = Object.create(null);
					words.forEach(function (word) {
							map[word] = true;
						});
					return map;
				}

				function renderSplitRow(change, language, lineSets, extraClass, group) {
					var rowStart = rowOpenTag(change.type, extraClass, group);
					if (change.type === "delete") {
						return rowStart + "<td class='ln'>" + change.originalLine + "</td><td class='code'>"
							+ renderCodeCell(change.text, language, lineSets.original[change.originalLine - 1])
							+ "</td><td class='ln'></td><td class='code'></td></tr>";
					}
					if (change.type === "insert") {
						return rowStart + "<td class='ln'></td><td class='code'></td><td class='ln'>" + change.newLine
							+ "</td><td class='code'>"
							+ renderCodeCell(change.text, language, lineSets.current[change.newLine - 1]) + "</td></tr>";
					}
					return rowStart + "<td class='ln'>" + change.originalLine + "</td><td class='code'>"
						+ renderCodeCell(change.text, language, lineSets.original[change.originalLine - 1])
						+ "</td><td class='ln'>" + change.newLine + "</td><td class='code'>"
						+ renderCodeCell(change.text, language, lineSets.current[change.newLine - 1]) + "</td></tr>";
				}
				function renderToggleRow(block, colspan) {
					return "<tr class='ctx-toggle' data-group='" + block.group + "'><td class='code ctx-cell' colspan='"
						+ colspan + "'><button class='ctx-btn' data-group='" + block.group + "' data-collapsed='"
						+ escapeHtml(block.collapsedLabel) + "' data-expanded='" + escapeHtml(block.expandedLabel)
						+ "' aria-expanded='false'>" + escapeHtml(block.collapsedLabel) + "</button></td></tr>";
				}
				function renderWarningRow(message, colspan) {
					return "<tr class='diff-warning'><td colspan='" + colspan + "'>" + escapeHtml(message) + "</td></tr>";
				}
				function renderUnified(blocks, language, lineSets, warningMessage) {
					var html = [];
					if (warningMessage) {
						html.push(renderWarningRow(warningMessage, 3));
					}
					blocks.forEach(function (block) {
							if (block.type === "collapsed") {
								html.push(renderToggleRow(block, 3));
								block.rows
									.forEach(function (row) {
										html.push(renderUnifiedRow(row, language, lineSets, "ctx-row", block.group));
									});
								return;
							}
							block.rows.forEach(function (row) {
									html.push(renderUnifiedRow(row, language, lineSets, "", null));
								});
						});
					return html.join("");
				}
				function renderSplit(blocks, language, lineSets, warningMessage) {
					var html = [];
					if (warningMessage) {
						html.push(renderWarningRow(warningMessage, 4));
					}
					blocks.forEach(function (block) {
							if (block.type === "collapsed") {
								html.push(renderToggleRow(block, 4));
								block.rows
									.forEach(function (row) {
										html.push(renderSplitRow(row, language, lineSets, "ctx-row", block.group));
									});
								return;
							}
							if (block.type === "change") {
								for (var index = 0; index < block.rows.length; index += 1) {
									html.push(renderSplitRow(block.rows[index], language, lineSets, "", null));
								}
								return;
							}
							block.rows.forEach(function (row) {
									html.push(renderSplitRow(row, language, lineSets, "", null));
								});
						});
					return html.join("");
				}
				function setView(view) {
					document.body.setAttribute("data-view", view);
					var table = document.getElementById("diff-table");
					if (table) {
						table.classList.toggle("diff-layout-unified", view === "unified");
						table.classList.toggle("diff-layout-split", view === "split");
					}
					document.querySelectorAll("button.toggle")
						.forEach(function (btn) {
							btn.classList.toggle("active", btn.getAttribute("data-view") === view);
						});
				}
				function updateContextButton(btn, open) {
					btn.textContent = open ? btn.getAttribute("data-expanded") : btn.getAttribute("data-collapsed");
					btn.setAttribute("aria-expanded", open ? "true" : "false");
				}
				function bindContextToggles() {
					var groupedRows = Object.create(null);
					document.querySelectorAll("tr.ctx-row[data-group]")
						.forEach(function (row) {
							var group = row.getAttribute("data-group");
							if (!groupedRows[group]) {
								groupedRows[group] = [];
							}
							groupedRows[group].push(row);
						});
					document.querySelectorAll("button.ctx-btn")
						.forEach(function (btn) {
							updateContextButton(btn, false);
							btn.addEventListener(
								"click",
								function () {
									var group = btn.getAttribute("data-group");
									var open = btn.getAttribute("aria-expanded") !== "true";
									(groupedRows[group] || []).forEach(function (row) {
											row.classList.toggle("ctx-open", open);
										});
									updateContextButton(btn, open);
								}
							);
						});
				}
				function normalizeStructuredDiff(diff) {
					if (!Array.isArray(diff)) {
						return null;
					}
					var changes = [];
					var originalLine = 1;
					var newLine = 1;
					for (var index = 0; index < diff.length; index += 1) {
						var entry = diff[index] || {};
						var type = entry.type;
						var text = entry.text;
						var lines = Array.isArray(text) ? text : normalizeLines(text == null ? "" : String(text));
						if (type !== "equal" && type !== "delete" && type !== "insert") {
							return null;
						}
						for (var lineIndex = 0; lineIndex < lines.length; lineIndex += 1) {
							var lineText = lines[lineIndex];
							if (type === "equal") {
								changes.push({
									type: "equal",
									originalLine: originalLine,
									newLine: newLine,
									text: lineText
								});
								originalLine += 1;
								newLine += 1;
							}
							else if (type === "delete") {
								changes.push({
									type: "delete",
									originalLine: originalLine,
									newLine: null,
									text: lineText
								});
								originalLine += 1;
							}
							else {
								changes.push({
									type: "insert",
									originalLine: null,
									newLine: newLine,
									text: lineText
								});
								newLine += 1;
							}
						}
					}
					return { changes: changes };
				}
				function buildChangesFromUnifiedDiff(originalText, diffText, language) {
					if (typeof diffText !== "string" || !diffText) {
						return null;
					}
					var originalLines = normalizeLines(originalText);
					var currentLineHtml = [];
					var changes = [];
					var diffLines = normalizeLines(diffText);
					var languageType = classifyLanguage(language);
					var state = {};
					var originalIndex = 0;
					var newIndex = 0;
					var seenHunk = false;
					function pushCurrentLine(text) {
						var result = highlightLineWithState(text, languageType, state);
						state = result.nextState || {};
						currentLineHtml.push(result.html);
					}
					for (var index = 0; index < diffLines.length; index += 1) {
						var line = diffLines[index];
						if (!seenHunk) {
							if (line.slice(0, 2) === "@@") {
								seenHunk = true;
							}
							else {
								continue;
							}
						}
						if (line.slice(0, 2) === "@@") {
							var match = /^@@(?: -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))?)? @@/.exec(line);
							if (!match) {
								return null;
							}
							if (match[1] && match[3]) {
								var targetOriginalIndex = Math.max(parseInt(match[1], 10) - 1, 0);
								var targetNewIndex = Math.max(parseInt(match[3], 10) - 1, 0);
								while (originalIndex < targetOriginalIndex && originalIndex < originalLines.length) {
									var equalText = originalLines[originalIndex];
									changes.push({
										type: "equal",
										originalLine: originalIndex + 1,
										newLine: newIndex + 1,
										text: equalText
									});
									pushCurrentLine(equalText);
									originalIndex += 1;
									newIndex += 1;
								}
								newIndex = Math.max(newIndex, targetNewIndex);
							}
							continue;
						}
						if (!line) {
							continue;
						}
						var marker = line.charAt(0);
						var text = line.slice(1);
						if (marker === " ") {
							changes.push({
								type: "equal",
								originalLine: originalIndex + 1,
								newLine: newIndex + 1,
								text: text
							});
							pushCurrentLine(text);
							originalIndex += 1;
							newIndex += 1;
							continue;
						}
						if (marker === "-") {
							changes.push({
								type: "delete",
								originalLine: originalIndex + 1,
								newLine: null,
								text: text
							});
							originalIndex += 1;
							continue;
						}
						if (marker === "+") {
							changes.push({
								type: "insert",
								originalLine: null,
								newLine: newIndex + 1,
								text: text
							});
							pushCurrentLine(text);
							newIndex += 1;
							continue;
						}
						if (line === "\\ No newline at end of file") {
							continue;
						}
						return null;
					}
					while (originalIndex < originalLines.length) {
						var trailingText = originalLines[originalIndex];
						changes.push({
							type: "equal",
							originalLine: originalIndex + 1,
							newLine: newIndex + 1,
							text: trailingText
						});
						pushCurrentLine(trailingText);
						originalIndex += 1;
						newIndex += 1;
					}
					return { changes: changes, currentHtml: currentLineHtml };
				}
				function buildCollapsedOriginalChanges(originalText, warningMessage) {
					var originalLines = normalizeLines(originalText);
					var changes = [];
					for (var index = 0; index < originalLines.length; index += 1) {
						changes.push({
							type: "equal",
							originalLine: index + 1,
							newLine: index + 1,
							text: originalLines[index]
						});
					}
					return { changes: changes, warningMessage: warningMessage || "" };
				}
				function renderFromStructuredContent(structuredContent) {
					structuredContent = structuredContent || {};
					var path = structuredContent.path || "";
					var language = prismLanguage(path);
					var originalText = structuredContent.original || "";
					var parsed = normalizeStructuredDiff(structuredContent.diff);
					if (!parsed) {
						parsed = buildChangesFromUnifiedDiff(originalText, structuredContent.diff, language);
					}
					if (!parsed) {
						parsed = buildCollapsedOriginalChanges(
							originalText,
							structuredContent.diff === "" ? "" : "Diff unavailable or invalid. Showing original content only."
						);
					}
					var changes = parsed.changes;
					var blocks = buildBlocks(changes);
					var lineSets = { original: buildHighlightedLines(originalText, language), current: parsed.currentHtml || [] };
					for (var changeIndex = 0; changeIndex < changes.length; changeIndex += 1) {
						var change = changes[changeIndex];
						if (change.type === "equal" && change.originalLine != null && change.newLine != null) {
							lineSets.current[change.newLine - 1] = lineSets.original[change.originalLine - 1];
						}
					}
					document.getElementById("unified-body").innerHTML = renderUnified(blocks, language, lineSets, parsed.warningMessage || "");
					document.getElementById("split-body").innerHTML = renderSplit(blocks, language, lineSets, parsed.warningMessage || "");
					bindContextToggles();
				}
				setView("unified");
				document.querySelectorAll("button.toggle")
					.forEach(function (btn) {
						btn.addEventListener(
							"click",
							function () {
								setView(btn.getAttribute("data-view"));
							}
						);
					});
				function setState(state) {
					document.body.setAttribute("data-state", state);
				}
				function setStatusMessage(id, message) {
					var element = document.getElementById(id);
					if (element) {
						element.textContent = message;
					}
				}
				function clearDiffTable() {
					var unifiedBody = document.getElementById("unified-body");
					var splitBody = document.getElementById("split-body");
					if (unifiedBody) {
						unifiedBody.innerHTML = "";
					}
					if (splitBody) {
						splitBody.innerHTML = "";
					}
				}
				function hasDiff(structuredContent) {
					return !!(structuredContent
						&& typeof structuredContent.diff === "string"
						&& structuredContent.diff.trim() !== "");
				}
				function applyResult(result) {
					if (result && result.isError) {
						clearDiffTable();
						setStatusMessage(
							"error-message",
							result.structuredContent
									&& result.structuredContent.message
								? String(result.structuredContent.message)
								: "The tool returned an error."
						);
						setState("error");
						return;
					}
					if (!hasDiff(result && result.structuredContent)) {
						clearDiffTable();
						setStatusMessage(
							"warning-message",
							"The tool returned successfully, but there is no diff to display."
						);
						setState("warning");
						return;
					}
					setState("ready");
					renderFromStructuredContent(result && result.structuredContent);
				}
				function showLoading() {
					setState("loading");
				}
				try {
					var app = new window.App({ name: "mcp-fs-diff", version: "1.0.0" });
					app.ontoolresult = applyResult;
					if (typeof app.connect === "function") {
						app.connect().then(showLoading).catch(function (e) {
								console.error("Failed to connect MCP App", e);
							});
					}
				}
				catch (e) {
					console.error("Failed to initialize MCP App", e);
				}
			})();
		</script>
	</body>
</html>
