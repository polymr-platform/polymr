polymr.database.variant=@polymr.database.variant@

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
quarkus.datasource.username=${DB_USER:polymr}
quarkus.datasource.password=${DB_PASSWORD:polymr}
quarkus.hibernate-orm.packages=be.celerex.polymr.model
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.hibernate-orm.mapping-files=@quarkus.hibernate-orm.mapping-files@
quarkus.flyway.migrate-at-start=true
quarkus.flyway.create-schemas=false
quarkus.flyway.locations=db/migration/common,db/migration/@polymr.database.variant@
%test.quarkus.flyway.baseline-on-migrate=true
%test.quarkus.flyway.baseline-version=1

%prod.quarkus.datasource.db-kind=@quarkus.datasource.db-kind@
%prod.quarkus.datasource.jdbc.url=@quarkus.datasource.jdbc.url@
%prod.quarkus.datasource.jdbc.driver=@quarkus.datasource.jdbc.driver@
%prod.quarkus.hibernate-orm.dialect=@quarkus.hibernate-orm.dialect@

quarkus.http.port=${POLYMR_HTTP_PORT:5050}
quarkus.http.host=${POLYMR_HTTP_HOST:0.0.0.0}

# Enable remote debug for Eclipse
quarkus.debug.enabled=true
quarkus.debug.port=8888

quarkus.http.cors.enabled=${QUARKUS_HTTP_CORS_ENABLED:true}
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://192.168.1.21:5174,null}
quarkus.http.static-resources.index-page=/index.html
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Disable Quarkus live reload
quarkus.live-reload.enabled=false

# Allow larger audio uploads (base64 expansion happens after upload)
quarkus.http.limits.max-body-size=${POLYMR_MAX_BODY_SIZE:120M}

# Increase max websocket message/frame sizes to 20MB
quarkus.websocket.max-frame-size=20971520
quarkus.websocket.max-message-size=20971520

polymr.tokens.access-ttl=PT15M
polymr.tokens.refresh-ttl=P30D

polymr.secrets.key=${POLYMR_SECRETS_KEY:changeit}

# Base URL for signed public asset links (example: https://app.example.com)
# polymr.public.assets.base-url=${POLYMR_PUBLIC_ASSETS_BASE_URL}

# TTL for signed public asset links
polymr.public.assets.ttl=${POLYMR_PUBLIC_ASSETS_TTL:12h}

# In-memory blob cache size (bytes)
polymr.blob.cache.max-bytes=${POLYMR_BLOB_CACHE_MAX_BYTES:104857600}

polymr.presence.reaper-interval=5m
polymr.presence.active-retention-seconds=3600

quarkus.log.category."be.celerex.polymr".level=DEBUG
quarkus.log.console.level=DEBUG
quarkus.log.category."be.celerex.polymr.session".level=INFO
quarkus.log.category."be.celerex.polymr.ws".level=INFO
%prod.quarkus.log.file.enable=true
%prod.quarkus.log.file.path=${user.home}/.config/polymr/logs/polymr.log
%prod.quarkus.log.file.level=DEBUG
%prod.quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%e%n

quarkus.otel.enabled=${OTEL_ENABLED:false}
quarkus.otel.exporter.otlp.enabled=${OTEL_EXPORTER_OTLP_ENABLED:false}

quarkus.index-dependency.langgraph4j.group-id=org.bsc.langgraph4j
quarkus.index-dependency.langgraph4j.artifact-id=langgraph4j-core
polymr.llm.http.log-responses-requests=true
polymr.mcp.request-timeout-seconds=900
polymr.llm.http.read-timeout-seconds=1800
polymr.llm.http.connect-timeout-seconds=60

# Workflow graph iteration cap (langgraph4j)
polymr.workflow.max-iterations=200

# How preview failures are handled: tool_failure or permission_request
polymr.tools.preview-failure-mode=tool_failure

# Where hard tool errors (for example JSON-RPC errors) return control: llm or user
polymr.tools.hard-error-turn=llm

# Compile polymr_pages file-path edits immediately after persisting source.
polymr.pages.compile-on-write=true

# Delete tags and tag categories from the database instead of soft deleting them.
polymr.tags.hard-delete-enabled=true
